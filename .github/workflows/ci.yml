name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, format, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Version and changelog agree
        # Documented in docs/RELEASING.md — the app version is single-sourced in
        # backend/app/__init__.py and must match the newest CHANGELOG heading.
        run: |
          VERSION=$(python -c "from app import __version__; print(__version__)")
          LATEST=$(grep -m1 -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' ../CHANGELOG.md | tr -d '## []')
          echo "__version__=$VERSION  changelog=$LATEST"
          test "$VERSION" = "$LATEST"

      - name: Lint
        run: ruff check app tests

      - name: Format check
        run: ruff format --check app tests

      - name: Tests (with coverage gate)
        # fail_under is enforced from pyproject.toml [tool.coverage.report].
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  frontend:
    name: Frontend (lint, types, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint (warnings are failures in CI)
        run: npx eslint --max-warnings=0

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:run

      - name: Production build
        run: npm run build

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --strict
        continue-on-error: false

      - name: Audit npm dependencies
        working-directory: frontend
        # Gated at "high": the only known moderate advisory is a transitive
        # PostCSS issue inside Next's build tooling, whose published "fix" is a
        # downgrade to Next 9. Tracked in SECURITY.md rather than silently
        # accepted or blindly auto-fixed.
        run: npm audit --audit-level=high

  integration:
    name: Integration (migrations, demo mode, smoke test)
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt

      - name: Boot with demo mode and verify the stack answers
        env:
          DEMO_MODE: "true"
          JWT_SECRET: ci-only-secret-value-at-least-32-chars
          ADMIN_PASSWORD: ci-admin-password
        run: |
          uvicorn app.main:app --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health/ready && break
            sleep 1
          done

          echo "— readiness —"
          curl -sf http://localhost:8000/health/ready | tee /tmp/ready.json
          grep -q '"status":"ready"' /tmp/ready.json

          echo "— demo data provisioned —"
          TOKEN=$(curl -sf -X POST http://localhost:8000/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"admin@example.com","password":"ci-admin-password"}' \
            | python -c 'import sys,json; print(json.load(sys.stdin)["access_token"])')
          COUNT=$(curl -sf -D - -o /dev/null "http://localhost:8000/api/leads?limit=1" \
            -H "Authorization: Bearer $TOKEN" | grep -i x-total-count | tr -dc '0-9')
          echo "leads: $COUNT"
          test "$COUNT" -ge 10

          echo "— chat produces a lead —"
          CID=$(curl -sf -X POST http://localhost:8000/api/chat/start \
            -H 'Content-Type: application/json' -d '{"client_name":"CI Bot"}' \
            | python -c 'import sys,json; print(json.load(sys.stdin)["conversation_id"])')
          for MSG in "Website" "A marketing site" '$3000' "ASAP" "ci@example.com" "no"; do
            curl -sf -X POST "http://localhost:8000/api/chat/$CID/msg" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"$MSG\"}" > /tmp/reply.json
          done
          grep -q '"done":true' /tmp/reply.json

          echo "— structured logs are valid JSON —"
          curl -sf http://localhost:8000/metrics | grep -q http_requests_total

      - name: Verify migrations are idempotent on an existing database
        env:
          DEMO_MODE: "true"
          JWT_SECRET: ci-only-secret-value-at-least-32-chars
        run: |
          python -c "
          from app import db_migrate
          from app.db import Base, engine
          for _ in range(3):
              db_migrate.enforce_sqlite_foreign_keys(engine)
              db_migrate.migrate(engine)
              Base.metadata.create_all(bind=engine)
              db_migrate.post_create(engine)
          print('migrations idempotent across repeated runs')
          "

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: intake-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: intake-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify the backend image runs as a non-root user
        run: |
          USER_ID=$(docker run --rm --entrypoint id intake-backend:ci -u)
          echo "backend uid: $USER_ID"
          test "$USER_ID" != "0"

      - name: Validate compose file
        # The stack declares `env_file: .env`, which is gitignored and so never
        # present on a runner. Materialise it from the template — the same first
        # step the README gives a human — so this validates the real file rather
        # than a weakened copy of it.
        run: |
          cp .env.example .env
          docker compose config --quiet
