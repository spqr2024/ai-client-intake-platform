# Render blueprint — https://render.com/docs/blueprint-spec
#
# Deploys the full stack: FastAPI API, Next.js dashboard, Postgres and Redis.
# Create it with Render → New → Blueprint, pointed at this repository.
#
# Secrets are deliberately declared with `sync: false` instead of values. Render
# prompts for those once at create time and stores them encrypted; nothing
# sensitive belongs in a file that lives in git.
#
# After the first deploy, two manual steps (see docs/DEPLOYMENT.md):
#   1. Point TELEGRAM webhook at the live API:
#        python -m app.telegram_bot set-webhook https://<api-host>
#   2. Sign in and change the bootstrap admin password.

databases:
  - name: intake-db
    databaseName: intake
    user: intake
    plan: basic-256mb

services:
  # ── API ────────────────────────────────────────────────────────────────
  - type: web
    name: intake-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health/ready
    autoDeployTrigger: commit
    envVars:
      # Turns the placeholder-credential check into a hard boot failure.
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      # Never true here: it seeds fake leads into the real database.
      - key: DEMO_MODE
        value: "false"

      - key: DATABASE_URL
        fromDatabase:
          name: intake-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: intake-redis
          property: connectionString

      # 32+ random bytes, generated by Render rather than a human.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_DAYS
        value: "14"

      # Must be HTTPS and must not contain localhost, or startup fails.
      - key: PUBLIC_APP_URL
        fromService:
          type: web
          name: intake-web
          property: host
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: intake-web
          property: host

      # Bootstrap admin. The password is prompted for once, then rotate it in
      # the UI after the first sign-in.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # Where "new lead" alerts are emailed.
      - key: STAFF_NOTIFICATION_EMAIL
        sync: false

      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: mock

      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      # Required whenever a bot token is set — the webhook fails closed.
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true

      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_TLS
        value: "true"

      - key: CRM_PROVIDER
        sync: false
      - key: CRM_API_KEY
        sync: false

      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: MAX_UPLOAD_MB
        value: "10"

  # ── Dashboard ──────────────────────────────────────────────────────────
  - type: web
    name: intake-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    autoDeployTrigger: commit
    envVars:
      # NEXT_PUBLIC_* is inlined at BUILD time, so this must be a build arg —
      # setting it only at runtime ships a bundle pinned to localhost:8000,
      # which then fails CSP and mixed-content checks on an HTTPS site.
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: intake-api
          property: host

  # ── Cache / queue ──────────────────────────────────────────────────────
  - type: keyvalue
    name: intake-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []  # private network only
