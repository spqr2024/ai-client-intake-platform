name: GitHub Pages

# Publishes site/ to GitHub Pages. Enable once under
# Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel a half-finished deployment; queue instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # The page ships with a __REPO_URL__ placeholder so no repository slug is
      # hardcoded — every link resolves against wherever this fork lives.
      - name: Inject repository URL
        run: |
          repo_url="${{ github.server_url }}/${{ github.repository }}"
          find site -type f -name '*.html' -print0 \
            | xargs -0 sed -i "s|__REPO_URL__|${repo_url}|g"
          ! grep -rq "__REPO_URL__" site || { echo "placeholder left unreplaced"; exit 1; }

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
