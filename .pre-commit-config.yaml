# Install once with:  pip install pre-commit && pre-commit install
# Keeps formatting and obvious mistakes out of the history instead of relying
# on reviewers to catch them.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Strips authorship, revision history and editing metadata out of Office
  # documents before they can be committed. Office files embed the author's
  # name, organisation and last-saved-by fields, which is a privacy leak in a
  # public repository even when the document text itself is harmless.
  # Note: the upstream hook declares `pass_filenames: false` and walks the tree
  # rather than the staged file list, so it rewrites Office/image files in place
  # across the repo, not just the ones being committed.
  - repo: https://github.com/openscilab/dmeta.git
    rev: v0.5
    hooks:
      - id: clear-metadata
        # Without this filter the hook runs on every commit and walks the whole
        # tree; any Office file locked by OneDrive/antivirus (common on Windows)
        # then aborts the commit with a PermissionError. Scoping it to Office
        # files means it only runs on the commits that can actually need it.
        files: \.(docx|doc|xlsx|xls|pptx|ppt)$

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint --max-warnings=0'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
